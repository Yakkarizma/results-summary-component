<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Summary Component</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">

        <div class="icerik">

            <div class="result">
                <h2>Your Result</h2>
            </div>

            <div class="summary">
                <h2>Summary</h2>

                <div class="yetenekler">
                    
                <div class="yetenek">
                    <div class="left reaction">
                        <img src="img/icon-reaction.svg" alt=""><span>Reaction</span>
                    </div>
                    <div class="right"><span>80 </span><span class="span-color">/ 100</span></div>
                </div>

                <div class="yetenek">
                    <div class="left memory">
                        <img src="img/icon-memory.svg" alt=""><span>Memory</span>
                    </div>
                    <div class="right"><span>92 </span><span class="span-color">/ 100</span></div>
                </div>

                <div class="yetenek">
                    <div class="left verbal">
                        <img src="img/icon-verbal.svg" alt=""><span>Verbal</span>
                    </div>
                    <div class="right"><span>61 </span><span class="span-color">/ 100</span></div>
                </div>

                <div class="yetenek">
                    <div class="left visual">
                        <img src="img/icon-visual.svg" alt=""><span>Visual</span>
                    </div>
                    <div class="right"><span>73 </span><span class="span-color">/ 100</span></div>
                </div>
                </div>

                <button class="continue"><b>Continue</b></button>
            </div>

        </div>
    </div>

</body>
</html>
